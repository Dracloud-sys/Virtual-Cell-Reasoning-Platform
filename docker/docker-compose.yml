services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      VCELL_KNOWLEDGE_BACKEND: memory
      VCELL_NEO4J_URI: bolt://neo4j:7687
      VCELL_QDRANT_URL: http://qdrant:6333
      VCELL_POSTGRES_DSN: postgresql://vcell:vcell@postgres:5432/vcell
    depends_on:
      - postgres
      - neo4j
      - qdrant

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: vcell
      POSTGRES_PASSWORD: vcell
      POSTGRES_DB: vcell
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/changeme
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4jdata:/data

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrantdata:/qdrant/storage

volumes:
  pgdata:
  neo4jdata:
  qdrantdata:
